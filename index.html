<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iframe Video Gallery</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  margin: 20px;
  padding: 0;
}
h1 {
  text-align: center;
  margin-bottom: 20px;
}
#searchBar {
  display: block;
  margin: 0 auto 30px auto;
  width: 50%;
  max-width: 500px;
  padding: 10px;
  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #ccc;
}
#videoGallery {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}
.videoBox {
  width: 510px;
  height: 400px;
  background: white;
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  text-align: center;
  flex-shrink: 0;
}
.videoBox iframe {
  width: 510px;
  height: 360px;
  border: 0;
}
.videoTitle {
  margin-top: 10px;
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>
<body>

<h1>Iframe Video Gallery</h1>
<input type="text" id="searchBar" placeholder="Search videos...">

<div id="videoGallery"></div>

<script>
// List your videos here
const videos = [
  { src: "https://www.sammy.com/embedframe/uuktuoocb1f", title: "First Video" },
  { src: "https://www.sammy.com/embedframe/abcd1234efg", title: "Second Video" },
  { src: "https://www.sammy.com/embedframe/hijk5678lmn", title: "Third Video" }
];

function loadVideos(filter = "") {
  const gallery = document.getElementById("videoGallery");
  gallery.innerHTML = "";

  videos.forEach(video => {
    if(!video.title.toLowerCase().includes(filter.toLowerCase())) return;

    const box = document.createElement("div");
    box.className = "videoBox";

    const iframe = document.createElement("iframe");
    iframe.src = video.src;
    iframe.frameBorder = 0;
    iframe.width = 510;
    iframe.height = 360;
    iframe.scrolling = "no";
    iframe.allowFullscreen = true;

    box.appendChild(iframe);

    const title = document.createElement("div");
    title.className = "videoTitle";
    title.textContent = video.title;
    box.appendChild(title);

    gallery.appendChild(box);
  });
}

// Initial load
loadVideos();

// Search functionality
document.getElementById("searchBar").addEventListener("input", (e) => {
  loadVideos(e.target.value);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>My Video Platform</title>
</head>

<body>

<h2>Upload Video</h2>

<input type="file" id="fileInput">
<button onclick="uploadVideo()">Upload</button>

<h2>Videos</h2>
<div id="videos"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://vaffcwxgredmpjnebpkk.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhZmZjd3hncmVkbXBqbmVicGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDc5MzEsImV4cCI6MjA4ODQ4MzkzMX0.pZvY_vKBrvsnYkUPDdlrEqMu4LhMaqQFd24aSCMTmE8"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

async function uploadVideo(){

const file = document.getElementById("fileInput").files[0]

if(!file){
alert("Choose a video first")
return
}

const { data, error } = await supabaseClient.storage
.from("videos")
.upload(file.name, file)

if(error){
alert("Upload failed")
console.log(error)
return
}

const { data: urlData } = supabaseClient.storage
.from("videos")
.getPublicUrl(file.name)

addVideo(urlData.publicUrl)

}

function addVideo(url){

const video = document.createElement("video")

video.src = url
video.controls = true
video.width = 400

document.getElementById("videos").appendChild(video)

}

</script>

</body>
</html>

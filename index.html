<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My YouTube-Style Video Gallery</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f9f9f9;
  margin: 0;
  padding: 20px;
}
h1 {
  text-align: center;
  margin-bottom: 20px;
}
#searchBar {
  display: block;
  margin: 0 auto 30px auto;
  width: 50%;
  max-width: 600px;
  padding: 10px;
  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #ccc;
}
#videoGallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}
.videoBox {
  background: white;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  overflow: hidden;
  transition: transform 0.2s;
}
.videoBox:hover {
  transform: scale(1.03);
}
.videoBox iframe {
  width: 100%;
  height: 200px;
  border: 0;
  display: block;
}
.videoTitle {
  padding: 10px;
  font-weight: bold;
  font-size: 16px;
  color: #111;
  text-align: left;
}
</style>
</head>
<body>

<h1>My YouTube-Style Video Gallery</h1>
<input type="text" id="searchBar" placeholder="Search videos...">

<div id="videoGallery"></div>

<script>
// List your videos here
const videos = [
  { src: "https://www.Xnxx.com/embedframe/uuktuoocb1f", title: "First Video" },
  { src: "https://www.pornhub.com/embedframe/abcd1234efg", title: "Second Video" },
  { src: "https://www.sammy.com/embedframe/hijk5678lmn", title: "Third Video" },
  // Add more videos here
];

function loadVideos(filter = "") {
  const gallery = document.getElementById("videoGallery");
  gallery.innerHTML = "";

  videos.forEach(video => {
    if(!video.title.toLowerCase().includes(filter.toLowerCase())) return;

    const box = document.createElement("div");
    box.className = "videoBox";

    const iframe = document.createElement("iframe");
    iframe.src = video.src;
    iframe.frameBorder = 0;
    iframe.allowFullscreen = true;

    box.appendChild(iframe);

    const title = document.createElement("div");
    title.className = "videoTitle";
    title.textContent = video.title;
    box.appendChild(title);

    gallery.appendChild(box);
  });
}

// Initial load
loadVideos();

// Filter videos by search
document.getElementById("searchBar").addEventListener("input", (e) => {
  loadVideos(e.target.value);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Files.fm Video Platform</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
}
h1 {
    text-align: center;
    margin-bottom: 20px;
}
#videoGallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}
.videoBox {
    background: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
}
.videoBox:hover {
    transform: scale(1.03);
    transition: 0.3s;
}
.videoTitle {
    margin-top: 8px;
    font-weight: bold;
    font-size: 16px;
}
</style>
</head>
<body>

<h1>My Video Gallery</h1>

<div id="videoGallery">

  <!-- First video -->
  <div class="videoBox">
    <script type="text/javascript" src="https://files.fm/embed/playerv2?hash=xwev3wy8xk&autoplay=off&autoload=off&w=100%&h=auto&poster_src=https://files.fm/thumb_video_picture.php?i=xwev3wy8xk&source_type=p2p" id="filesfm_embed_js__xwev3wy8xk"></script>
    <div class="videoTitle">My First Video</div>
  </div>

  <!-- Second video -->
  <div class="videoBox">
    <script type="text/javascript" src="https://files.fm/embed/playerv2?hash=8rs9dp5pjr&autoplay=off&autoload=off&w=100%&h=auto&poster_src=https://files.fm/thumb_video_picture.php?i=8rs9dp5pjr&source_type=simple" id="filesfm_embed_js__8rs9dp5pjr"></script>
    <div class="videoTitle">Second Video</div>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full-Width YouTube-Style Gallery</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f9f9f9;
  margin: 0;
  padding: 20px;
}
h1 {
  text-align: center;
  margin-bottom: 20px;
}
#searchBar {
  display: block;
  margin: 0 auto 30px auto;
  width: 50%;
  max-width: 600px;
  padding: 10px;
  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #ccc;
}
#videoGallery {
  display: flex;
  flex-direction: column;
  gap: 30px;
}
.videoBox {
  background: white;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.videoBox iframe {
  width: 100%;
  height: 400px; /* adjust height as needed */
  border: 0;
}
.videoTitle {
  padding: 10px;
  font-weight: bold;
  font-size: 18px;
  color: #111;
}
@media (max-width: 768px) {
  .videoBox iframe {
    height: 250px;
  }
}
</style>
</head>
<body>

<h1>Full-Width Video Gallery</h1>
<input type="text" id="searchBar" placeholder="Search videos...">

<div id="videoGallery"></div>

<script>
// List your videos
const videos = [
  { src: "https://www.xnxx.com/embedframe/uuktuoocb1f", title: "First Video" },
  { src: "https://www.brazzers.com/embedframe/abcd1234efg", title: "Second Video" },
  { src: "https://www.sammy.com/embedframe/hijk5678lmn", title: "Third Video" }
];

function loadVideos(filter = "") {
  const gallery = document.getElementById("videoGallery");
  gallery.innerHTML = "";

  videos.forEach(video => {
    if(!video.title.toLowerCase().includes(filter.toLowerCase())) return;

    const box = document.createElement("div");
    box.className = "videoBox";

    const iframe = document.createElement("iframe");
    iframe.src = video.src;
    iframe.frameBorder = 0;
    iframe.allowFullscreen = true;

    box.appendChild(iframe);

    const title = document.createElement("div");
    title.className = "videoTitle";
    title.textContent = video.title;
    box.appendChild(title);

    gallery.appendChild(box);
  });
}

// Initial load
loadVideos();

// Search functionality
document.getElementById("searchBar").addEventListener("input", (e) => {
  loadVideos(e.target.value);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Upload Library</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
padding:20px;
}

h1{
text-align:center;
}

#uploadBtn{
display:block;
margin:20px auto;
padding:12px 25px;
font-size:16px;
cursor:pointer;
}

#gallery{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.videoBox{
width:320px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

video{
width:100%;
border-radius:5px;
}
</style>

</head>

<body>

<h1>My Video Library</h1>

<button id="uploadBtn">Upload Video</button>

<div id="gallery"></div>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>

const cloudName = "dl7yjfpca"
const uploadPreset = "irlEAK6ec4HytAtXWe_g8sZEdOU"

const gallery = document.getElementById("gallery")

const widget = cloudinary.createUploadWidget(
{
cloudName: cloudName,
uploadPreset: uploadPreset,
resourceType: "video",
multiple: true,
sources: ["local","url","camera"],
clientAllowedFormats:["mp4","mov","webm"]
},

(error,result)=>{

if(!error && result && result.event === "success"){

const videoURL = result.info.secure_url

const box = document.createElement("div")
box.className="videoBox"

const vid = document.createElement("video")
vid.src = videoURL
vid.controls = true

box.appendChild(vid)
gallery.appendChild(box)

}

}
)

document.getElementById("uploadBtn").onclick = function(){
widget.open()
}

</script>

</body>
</html>

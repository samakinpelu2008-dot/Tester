<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Gallery</title>
<style>
body { font-family: Arial; background:#f9f9f9; margin:20px; }
h1 { text-align:center; margin-bottom:20px; }
#videoGallery { display:flex; flex-direction:column; gap:20px; }
.videoBox { cursor:pointer; background:white; padding:10px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.15); display:flex; align-items:center; gap:15px; }
.videoBox img { width:180px; height:100px; object-fit:cover; border-radius:5px; }
.videoTitle { font-weight:bold; font-size:16px; color:#111; }
</style>
</head>
<body>

<h1>Video Gallery</h1>
<div id="videoGallery"></div>

<script>
// List your videos (with thumbnails)
const videos = [
  { id: "uuktuoocb1f", title: "First Video", thumbnail: "thumbnails/thumb1.jpg" },
  { id: "abcd1234efg", title: "Second Video", thumbnail: "thumbnails/thumb2.jpg" },
  { id: "hijk5678lmn", title: "Third Video", thumbnail: "thumbnails/thumb3.jpg" }
];

const gallery = document.getElementById("videoGallery");

videos.forEach(video => {
  const box = document.createElement("div");
  box.className = "videoBox";

  box.innerHTML = `<img src="${video.thumbnail}" alt="${video.title}"><div class="videoTitle">${video.title}</div>`;
  
  box.addEventListener("click", () => {
    // Open viewing page with query param
    window.location.href = `watch.html?id=${video.id}&title=${encodeURIComponent(video.title)}`;
  });

  gallery.appendChild(box);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watch</title>

<style>

body{
margin:0;
font-family:Arial;
}

.player{
width:100%;
aspect-ratio:16/9;
}

.player iframe{
width:100%;
height:100%;
border:none;
}

</style>

</head>

<body>

<div class="player">
<iframe id="videoFrame" allowfullscreen></iframe>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const videoId = params.get("id");

document.getElementById("videoFrame").src =
"https://www.sammy.com/embedframe/" + videoId;

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watch Video</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
}
.player{
width:100%;
aspect-ratio:16/9;
background:black;
}
.player iframe{
width:100%;
height:100%;
border:none;
}
.info{
padding:15px;
}
.title{
font-size:20px;
font-weight:bold;
}
.desc{
color:gray;
margin-top:10px;
font-size:16px;
}
</style>
</head>
<body>

<div class="player">
<iframe id="videoFrame" allowfullscreen></iframe>
</div>

<div class="info">
<div id="videoTitle" class="title"></div>
<div id="videoDesc" class="desc"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const title = params.get("title") || "No Title";
const desc = params.get("desc") || "No Description";

// Connect video
document.getElementById("videoFrame").src = "https://www.xnxx.com/embedframe/" + id;

// Show title and description
document.getElementById("videoTitle").innerText = title.replaceAll("_"," ");
document.getElementById("videoDesc").innerText = desc.replaceAll("_"," ");
</script>

</body>
</html>

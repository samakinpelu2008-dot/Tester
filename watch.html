<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watch Video</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f9f9f9;
}

.player{
width:100%;
aspect-ratio:16/9;
background:black;
}

.player video{
width:100%;
height:100%;
}

.actions{
padding:15px;
}

.download-btn{
display:inline-flex;
align-items:center;
gap:6px;
padding:8px 14px;
background:#ff0000;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px;
font-weight:bold;
}

.download-btn:hover{
background:#cc0000;
}

</style>

</head>

<body>

<div class="player">
<video id="videoPlayer" controls></video>
</div>

<div class="actions">
<a id="downloadBtn" class="download-btn" download>
⬇ Download
</a>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const videoId = params.get("id");

const videoURL = "videos/" + videoId + ".mp4";

document.getElementById("videoPlayer").src = videoURL;
document.getElementById("downloadBtn").href = videoURL;

</script>

</body>
</html>

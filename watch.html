<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watch Video</title>

<style>

body{
margin:0;
font-family:Arial;
}

.player{
width:100%;
aspect-ratio:16/9;
}

.player video{
width:100%;
height:100%;
}

.download{
display:block;
padding:12px;
text-align:center;
background:#ff0000;
color:white;
font-weight:bold;
text-decoration:none;
margin:15px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="player">
<video controls>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<a class="download" href="video.mp4" download>
Download Video
</a>

</body>
</html>

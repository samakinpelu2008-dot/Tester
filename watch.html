<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watch Video</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
}

.player{
  width:100%;
  aspect-ratio:16/9;
}

.player iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>
<body>

<div class="player">
  <iframe id="videoFrame" allowfullscreen></iframe>
</div>

<script>
// get the video id from URL
const params = new URLSearchParams(window.location.search);
const videoId = params.get("id");

// set iframe src
document.getElementById("videoFrame").src = "https://www.sammy.com/embedframe/" + videoId;
</script>

</body>
</html>

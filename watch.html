<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Video</title>
<style>
body { font-family: Arial; background:#f9f9f9; margin:0; padding:20px; }
.videoContainer { max-width:900px; margin:auto; }
.videoTitle { font-weight:bold; font-size:24px; margin:15px 0; }
iframe { width:100%; height:500px; border:0; }
</style>
</head>
<body>

<div class="videoContainer">
  <div class="videoTitle" id="videoTitle"></div>
  <iframe id="videoPlayer" src="" allowfullscreen></iframe>
</div>

<script>
// Get query parameters
const params = new URLSearchParams(window.location.search);
const videoId = params.get("id");
const videoTitle = params.get("title");

document.getElementById("videoTitle").textContent = videoTitle;
document.getElementById("videoPlayer").src = `https://www.xnxx.com/embedframe/${videoId}`;
</script>

</body>
</html>
